<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Compra DreamTech</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #ffffff; color: #000; }
        header { background-color: #000; color: #fff; text-align: center; padding: 30px; }
        .container { max-width: 600px; margin: 40px auto; padding: 30px; border: 1px solid #000; border-radius: 10px; }
        h2 { text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #000; border-radius: 5px; box-sizing: border-box; }
        button { margin-top: 20px; width: 100%; padding: 15px; background-color: #000; color: #fff; border: none; font-size: 1em; cursor: pointer; border-radius: 5px; }
        button:hover { background-color: #333; }
        footer { background-color: #000; color: #fff; text-align: center; padding: 15px; margin-top: 40px; }
    </style>
</head>
<body>

<header>
    <h1>Finalizar compra</h1>
</header>

<div class="container">
    <h2>Completa tus datos</h2>

    <!-- Se eliminaron los forms duplicados y se dejó solo uno funcional -->
    <form action="guardar.php" method="POST">
        <label for="dni">DNI</label>
        <input type="text" id="dni" name="dni" required>

        <label for="nombre">Nombre y Apellido</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="direccion">Dirección</label>
        <input type="text" id="direccion" name="direccion" required>

        <label for="pago">Método de pago</label>
        <select id="pago" name="pago" required>
            <option value="">Seleccionar...</option>
            <option value="Tarjeta de crédito">Tarjeta de crédito</option>
            <option value="Tarjeta de débito">Tarjeta de débito</option>
            <option value="Transferencia bancaria">Transferencia bancaria</option>
            <option value="Pago contra entrega">Pago contra entrega</option>
        </select>

        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" name="email" required>

        <button type="submit">Confirmar compra</button>
    </form>
</div>

<footer>
    <p>© 2026 DreamTech</p>
</footer>

</body>
</html>
